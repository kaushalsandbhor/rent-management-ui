<div class="container">

    <mat-card>

        <mat-card-title>
            Current Rent
        </mat-card-title>

        <mat-card-content>

            <h2>
                ₹{{ currentRent?.rentAmount }}
            </h2>

            <p *ngIf="currentRent">
                Effective From
                {{ formatMonthYear(currentRent.effectiveFrom) }}
            </p>

        </mat-card-content>

    </mat-card>

    <br>

    <div class="rent-sett-filter">

        <mat-card>

            <mat-card-title>
                Change Rent
            </mat-card-title>

            <mat-card-content>

                <form
                    [formGroup]="form"
                    (ngSubmit)="save()">

                    <mat-form-field appearance="outline">

                        <mat-label>
                            New Rent
                        </mat-label>

                        <input
                            matInput
                            type="number"
                            formControlName="rentAmount">

                    </mat-form-field>

                    <mat-form-field appearance="outline">

                        <mat-label>
                            Month
                        </mat-label>

                        <mat-select formControlName="selectedMonth">

                            <mat-option
                                *ngFor="let month of months"
                                [value]="month.value">

                                {{ month.name }}

                            </mat-option>

                        </mat-select>

                    </mat-form-field>

                    <mat-form-field appearance="outline">

                        <mat-label>
                            Year
                        </mat-label>

                        <mat-select formControlName="selectedYear">

                            <mat-option
                                *ngFor="let year of years"
                                [value]="year">

                                {{ year }}

                            </mat-option>

                        </mat-select>

                    </mat-form-field>

                    <button
                        mat-raised-button
                        color="primary"
                        type="submit">

                        Save

                    </button>

                </form>

            </mat-card-content>

        </mat-card>

    </div>

    <br>

    <mat-card>

        <mat-card-title>
            Rent History
        </mat-card-title>

        <table
            mat-table
            [dataSource]="dataSource">

            <ng-container matColumnDef="effectiveFrom">

                <th mat-header-cell *matHeaderCellDef>
                    Effective From
                </th>

                <td mat-cell *matCellDef="let row">

                    {{ formatMonthYear(row.effectiveFrom) }}

                </td>

            </ng-container>

            <ng-container matColumnDef="rentAmount">

                <th mat-header-cell *matHeaderCellDef>
                    Rent
                </th>

                <td mat-cell *matCellDef="let row">

                    ₹{{ row.rentAmount }}

                </td>

            </ng-container>

            <tr
                mat-header-row
                *matHeaderRowDef="displayedColumns">
            </tr>

            <tr
                mat-row
                *matRowDef="let row; columns: displayedColumns;">
            </tr>

        </table>

    </mat-card>

</div>

<h2 mat-dialog-title>

    Collect Payment

</h2>

<mat-dialog-content>

    <p><strong>Flat :</strong> {{data.flatNumber}}</p>

    <p><strong>Tenant :</strong> {{data.tenantName}}</p>

    <p><strong>Rent :</strong> ₹ {{data.rent}}</p>

    <p><strong>Billing :</strong> {{data.billingMonth}} / {{data.billingYear}}</p>

</mat-dialog-content>

<mat-dialog-actions align="end">

    <button mat-button mat-dialog-close>

        Close

    </button>

</mat-dialog-actions>

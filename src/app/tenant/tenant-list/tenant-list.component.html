<div class="page-header">

    <p class="mat-body-1">
        Total Rows : {{ tenants.length }}
    </p>

    <div class="top-bar">

        <button
            class="add-tenant-btn"
            mat-raised-button
            color="primary"
            (click)="openAddTenant()">

            + Add Tenant

        </button>

    </div>

</div>

<div *ngIf="loading">
  Loading Tenants ...
</div>

<div
    class="table-container"
    *ngIf="!loading">

    <table
        mat-table
        [dataSource]="tenants"
        class="mat-elevation-z2 imtable">

    <ng-container matColumnDef="name">

        <th mat-header-cell *matHeaderCellDef>

            Name

        </th>

        <td mat-cell *matCellDef="let row">

            {{row.name}}

        </td>

    </ng-container>

    <ng-container matColumnDef="phone">

        <th mat-header-cell *matHeaderCellDef>

            Phone

        </th>

        <td mat-cell *matCellDef="let row">

            {{row.phone}}

        </td>

    </ng-container>

    <ng-container matColumnDef="flat">
    
        <th mat-header-cell *matHeaderCellDef>
    
            Flat
    
        </th>
    
        <td mat-cell *matCellDef="let row">
    
            {{row.flatNumber}}
    
        </td>
    
    </ng-container>
    
    <ng-container matColumnDef="joining">
    
        <th mat-header-cell *matHeaderCellDef>
    
            Joining
        </th>
    
        <td mat-cell *matCellDef="let row">
    
            {{row.joiningDate}}
    
        </td>
    
    </ng-container>
    
    <ng-container matColumnDef="leaving">
    
        <th mat-header-cell *matHeaderCellDef>
    
            Leaving
    
        </th>
    
        <td mat-cell *matCellDef="let row">
    
            {{ row.leavingDate || '-' }}
    
        </td>
    
    </ng-container>
    
    <ng-container matColumnDef="deposit">
    
        <th mat-header-cell *matHeaderCellDef>
    
            Deposit

        </th>

        <td mat-cell *matCellDef="let row">

            ₹ {{row.deposit}}

        </td>

    </ng-container>

    <ng-container matColumnDef="status">

    <th mat-header-cell *matHeaderCellDef>

        Status

    </th>

    <td mat-cell *matCellDef="let row">

        {{ row.leavingDate ? 'INACTIVE' : 'ACTIVE' }}

    </td>

</ng-container>

   <ng-container matColumnDef="action">

    <th mat-header-cell *matHeaderCellDef>

        Action

    </th>

    <td mat-cell *matCellDef="let row">

        <button
            mat-raised-button
            color="primary"
            (click)="editTenant(row)">

            Edit

        </button>

        &nbsp;

        <button
            mat-raised-button
            color="warn"
            (click)="vacateTenant(row)"
            [disabled]="row.leavingDate">

            Vacate

        </button>

    </td>

</ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

</table>
